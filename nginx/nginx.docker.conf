# Same as nginx.conf but upstream = automation-hub:8000 (Docker service name)

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 500M;
    client_body_buffer_size 1m;

    upstream automation_hub {
        server automation-hub:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;
        root /var/www;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Public share pages + Power BI endpoints
        location ^~ /api/data/tables/share/ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://automation_hub;
        }

        location ^~ /shared/ {
            proxy_pass http://automation_hub;
        }

        location / {
            proxy_pass http://automation_hub;
        }
    }
}
