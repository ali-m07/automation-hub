<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Automation Hub</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container fade-in">
        <header>
            <h1>Automation Hub</h1>
            <p class="subtitle">Set a new password for your account.</p>
        </header>

        <div class="card slide-up">
            <h2>Reset password</h2>
            <form id="reset-form" class="form-vertical">
                <input type="hidden" id="token" name="token" value="{{ token }}">
                <div class="form-group">
                    <label for="new_password">New password</label>
                    <input type="password" id="new_password" name="new_password" class="form-control" placeholder="12+ chars, Aa1! (no spaces)" required>
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm password</label>
                    <input type="password" id="confirm" name="confirm" class="form-control" placeholder="Same as above" required>
                </div>
                <button class="btn btn-success btn-large" type="submit">Set password</button>
            </form>
            <div id="reset-status" class="status-box" style="margin-top: 16px;"></div>
            <div style="margin-top:12px; color:#6b7280; font-size:0.85rem;">
                Password policy: <strong>12+</strong> chars, at least <strong>1 uppercase</strong>, <strong>1 lowercase</strong>, <strong>1 digit</strong>, <strong>1 symbol</strong>, no spaces.
            </div>
            <p style="margin-top: 20px;"><a href="/login">Back to login</a></p>
        </div>
    </div>
    <script>
        document.getElementById('reset-form').onsubmit = async function(e) {
            e.preventDefault();
            const statusEl = document.getElementById('reset-status');
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm').value;
            if (newPassword !== confirm) {
                statusEl.textContent = 'Passwords do not match';
                statusEl.className = 'status-box error';
                return;
            }
            statusEl.textContent = 'Updating...';
            statusEl.className = 'status-box info';
            try {
                const res = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword }),
                });
                const data = await res.json();
                if (data.success) {
                    statusEl.textContent = data.message || 'Password updated. Redirecting to login...';
                    statusEl.className = 'status-box success';
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    statusEl.textContent = data.error || 'Failed to reset password';
                    statusEl.className = 'status-box error';
                }
            } catch (err) {
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status-box error';
            }
        };
    </script>
</body>
</html>
