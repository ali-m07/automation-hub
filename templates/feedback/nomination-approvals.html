<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluator Nomination Requests - Automation Hub</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --success-light: #d1fae5;
            --success-bg: #ecfdf5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --danger-bg: #fef2f2;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --border: #e5e7eb;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 4px;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--gray-500);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-success:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-outline {
            background: white;
            border: 1px solid var(--border);
            color: var(--gray-700);
        }

        .btn-outline:hover {
            background: var(--gray-50);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--gray-100);
            padding: 4px;
            border-radius: var(--radius);
            width: fit-content;
        }

        .tab {
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--gray-800);
        }

        .tab.active {
            background: white;
            color: var(--gray-900);
            box-shadow: var(--shadow);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 42px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .filter-select {
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: white;
            min-width: 160px;
        }

        /* Request Card */
        .request-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 16px;
            background: white;
        }

        .request-header {
            background: var(--gray-50);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .request-info h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 4px;
        }

        .request-info p {
            font-size: 13px;
            color: var(--gray-500);
        }

        .request-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending {
            background: var(--warning-light);
            color: #92400e;
        }

        .status-partial {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-closed {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .request-body {
            padding: 20px;
        }

        /* Evaluator Row */
        .evaluator-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .evaluator-row:last-child {
            margin-bottom: 0;
        }

        .evaluator-row.pending {
            background: var(--gray-50);
            border: 1px solid var(--border);
        }

        .evaluator-row.approved {
            background: var(--success-bg);
            border: 1px solid #a7f3d0;
        }

        .evaluator-row.rejected {
            background: var(--danger-bg);
            border: 1px solid #fecaca;
        }

        .evaluator-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .evaluator-info {
            flex: 1;
            min-width: 0;
        }

        .evaluator-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 2px;
        }

        .evaluator-meta {
            font-size: 13px;
            color: var(--gray-500);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .evaluator-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .evaluator-reason {
            font-size: 13px;
            color: var(--gray-600);
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 8px;
        }

        .evaluator-reason strong {
            color: var(--gray-700);
            font-weight: 500;
        }

        .evaluator-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .action-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .approve-btn {
            background: var(--success);
            color: white;
        }

        .approve-btn:hover {
            background: #059669;
        }

        .approve-btn:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
        }

        .reject-btn {
            background: white;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .reject-btn:hover {
            background: var(--danger-light);
        }

        .reject-btn:disabled {
            border-color: var(--gray-300);
            color: var(--gray-400);
            cursor: not-allowed;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-indicator.approved {
            background: var(--success-light);
            color: #065f46;
        }

        .status-indicator.rejected {
            background: var(--danger-light);
            color: #991b1b;
        }

        .status-indicator.pending {
            background: var(--warning-light);
            color: #92400e;
        }

        /* Rejection Reason Input */
        .rejection-input {
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .rejection-input textarea {
            width: 100%;
            padding: 10px;
            font-size: 13px;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 6px;
            resize: vertical;
            min-height: 60px;
        }

        .rejection-input textarea:focus {
            outline: none;
            border-color: var(--danger);
        }

        .rejection-input .btns {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            justify-content: flex-end;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--gray-500);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--gray-300);
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        /* Footer */
        .request-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray-50);
        }

        .request-footer .btn-add {
            font-size: 13px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease;
        }

        .toast-success {
            background: var(--success);
            color: white;
        }

        .toast-error {
            background: var(--danger);
            color: white;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Evaluator Nomination Requests</h1>
                <p class="page-subtitle">Review and approve evaluator nominations from your team</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('pending')">
                Pending <span id="pendingCount">(0)</span>
            </button>
            <button class="tab" onclick="switchTab('all')">
                All Requests
            </button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name..." oninput="applyFilters()">
            </div>
            <select class="filter-select" id="teamFilter" onchange="applyFilters()">
                <option value="">All Teams</option>
            </select>
            <select class="filter-select" id="verticalFilter" onchange="applyFilters()">
                <option value="">All Verticals</option>
            </select>
        </div>

        <!-- Requests List -->
        <div id="requestsList">
            <div class="empty-state">
                <i class="fas fa-inbox"></i>
                <h3>No Pending Requests</h3>
                <p>You don't have any pending evaluator nomination requests.</p>
            </div>
        </div>
    </div>

    <!-- User Picker Modal for Adding Evaluators -->
    <div class="modal-overlay" id="userPickerModal" style="display: none;">
        <div class="modal" style="max-width: 560px; margin: 24px;">
            <div class="modal-header" style="padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;">
                <h3 style="font-size: 18px; font-weight: 600;">Add Evaluator</h3>
                <button class="modal-close" onclick="closeAddEvaluatorModal()" style="width: 32px; height: 32px; border-radius: 6px; border: none; background: transparent; color: var(--gray-500); cursor: pointer;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="padding: 24px;">
                <div style="margin-bottom: 16px;">
                    <input type="text" id="addEvaluatorSearch" placeholder="Search by name, job title, team..."
                           style="width: 100%; padding: 12px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px;"
                           oninput="searchUsersToAdd()">
                </div>
                <div id="addUserResults" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let allNominations = [];
        let currentNominationId = null;
        let searchTimeout = null;

        document.addEventListener('DOMContentLoaded', loadRequests);

        async function loadRequests() {
            try {
                const response = await fetch('/api/feedback/evaluator-nomination/manager/requests');
                const data = await response.json();
                allNominations = data.nominations || [];
                renderRequests();
                loadFilterOptions();
            } catch (error) {
                console.error('Error loading requests:', error);
            }
        }

        function loadFilterOptions() {
            const teams = new Set();
            const verticals = new Set();

            allNominations.forEach(nom => {
                nom.evaluators?.forEach(eval => {
                    if (eval.team) teams.add(eval.team);
                    if (eval.vertical) verticals.add(eval.vertical);
                });
            });

            const teamSelect = document.getElementById('teamFilter');
            const verticalSelect = document.getElementById('verticalFilter');

            teams.forEach(team => {
                teamSelect.innerHTML += `<option value="${team}">${team}</option>`;
            });
            verticals.forEach(vertical => {
                verticalSelect.innerHTML += `<option value="${vertical}">${vertical}</option>`;
            });
        }

        function renderRequests() {
            const container = document.getElementById('requestsList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const teamFilter = document.getElementById('teamFilter').value;
            const verticalFilter = document.getElementById('verticalFilter').value;

            let filtered = allNominations.filter(nom => {
                const matchesSearch = !search ||
                    nom.nominator_info?.full_name?.toLowerCase().includes(search) ||
                    nom.evaluators?.some(e => e.full_name?.toLowerCase().includes(search));

                const matchesTeam = !teamFilter ||
                    nom.evaluators?.some(e => e.team === teamFilter);

                const matchesVertical = !verticalFilter ||
                    nom.evaluators?.some(e => e.vertical === verticalFilter);

                return matchesSearch && matchesTeam && matchesVertical;
            });

            // Update pending count
            const pendingCount = allNominations.filter(n => n.status !== 'closed').length;
            document.getElementById('pendingCount').textContent = `(${pendingCount})`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Requests Found</h3>
                        <p>No evaluator nomination requests match your filters.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(nom => {
                const submittedDate = new Date(nom.submitted_at).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                const allProcessed = nom.evaluators?.every(e => e.status === 'approved' || e.status === 'rejected');
                const hasApproved = nom.evaluators?.some(e => e.status === 'approved');

                return `
                    <div class="request-card">
                        <div class="request-header">
                            <div class="request-info">
                                <h3>Evaluator Nomination Request</h3>
                                <p>Submitted by <strong>${nom.nominator_info?.full_name || nom.nominator_username}</strong> on ${submittedDate}</p>
                            </div>
                            <span class="request-status status-${nom.status}">
                                <i class="fas fa-${nom.status === 'closed' ? 'check' : nom.status === 'pending' ? 'clock' : 'exclamation-circle'}"></i>
                                ${nom.status.charAt(0).toUpperCase() + nom.status.slice(1)}
                            </span>
                        </div>
                        <div class="request-body">
                            ${nom.evaluators?.map(eval => renderEvaluatorRow(nom.id, eval)).join('') || ''}
                        </div>
                        <div class="request-footer">
                            <button class="btn btn-outline btn-sm btn-add" onclick="openAddEvaluatorModal('${nom.id}')">
                                <i class="fas fa-plus"></i> Add New Evaluator
                            </button>
                            <button class="btn btn-success" onclick="closeNomination('${nom.id}')" ${!allProcessed ? 'disabled' : ''}>
                                <i class="fas fa-check-circle"></i>
                                Complete Review & Close Ticket
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEvaluatorRow(nominationId, eval) {
            const statusClass = eval.status || 'pending';
            const isProcessed = statusClass === 'approved' || statusClass === 'rejected';

            return `
                <div class="evaluator-row ${statusClass}" id="eval-${nominationId}-${eval.username}">
                    <div class="evaluator-avatar">
                        ${getInitials(eval.full_name || eval.username)}
                    </div>
                    <div class="evaluator-info">
                        <div class="evaluator-name">${eval.full_name || eval.username}</div>
                        <div class="evaluator-meta">
                            ${eval.job_title ? `<span><i class="fas fa-briefcase"></i> ${eval.job_title}</span>` : ''}
                            ${eval.team ? `<span><i class="fas fa-users"></i> ${eval.team}</span>` : ''}
                            ${eval.vertical ? `<span><i class="fas fa-layer-group"></i> ${eval.vertical}</span>` : ''}
                        </div>
                        <div class="evaluator-reason">
                            <strong>Reason:</strong> ${eval.reason || 'No reason provided'}
                            ${eval.rejection_reason ? `<br><strong style="color: var(--danger);">Rejection Reason:</strong> ${eval.rejection_reason}` : ''}
                        </div>
                        <div id="rejection-input-${nominationId}-${eval.username}" style="display: none;" class="rejection-input">
                            <textarea placeholder="Reason for rejection (optional)"></textarea>
                            <div class="btns">
                                <button class="btn btn-outline btn-sm" onclick="cancelReject('${nominationId}', '${eval.username}')">Cancel</button>
                                <button class="btn btn-danger btn-sm" onclick="confirmReject('${nominationId}', '${eval.username}')">Confirm Reject</button>
                            </div>
                        </div>
                    </div>
                    <div class="evaluator-actions">
                        ${statusClass === 'pending' ? `
                            <button class="action-btn approve-btn" onclick="approveEvaluator('${nominationId}', '${eval.username}')">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="action-btn reject-btn" onclick="showRejectInput('${nominationId}', '${eval.username}')">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        ` : `
                            <span class="status-indicator ${statusClass}">
                                <i class="fas fa-${statusClass === 'approved' ? 'check-circle' : 'times-circle'}"></i>
                                ${statusClass.charAt(0).toUpperCase() + statusClass.slice(1)}
                            </span>
                        `}
                    </div>
                </div>
            `;
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function applyFilters() {
            renderRequests();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            // For now, both tabs show the same data
            loadRequests();
        }

        async function approveEvaluator(nominationId, evaluatorUsername) {
            try {
                const response = await fetch(`/api/feedback/evaluator-nomination/${nominationId}/approve-evaluator`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ evaluator_username: evaluatorUsername })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Evaluator approved', 'success');
                    loadRequests();
                } else {
                    showToast(data.error || 'Error approving', 'error');
                }
            } catch (error) {
                showToast('Error approving evaluator', 'error');
            }
        }

        function showRejectInput(nominationId, evaluatorUsername) {
            document.getElementById(`rejection-input-${nominationId}-${evaluatorUsername}`).style.display = 'block';
        }

        function cancelReject(nominationId, evaluatorUsername) {
            document.getElementById(`rejection-input-${nominationId}-${evaluatorUsername}`).style.display = 'none';
        }

        async function confirmReject(nominationId, evaluatorUsername) {
            const reason = document.querySelector(`#rejection-input-${nominationId}-${evaluatorUsername} textarea`).value;

            try {
                const response = await fetch(`/api/feedback/evaluator-nomination/${nominationId}/reject-evaluator`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        evaluator_username: evaluatorUsername,
                        reason: reason
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Evaluator rejected', 'success');
                    loadRequests();
                } else {
                    showToast(data.error || 'Error rejecting', 'error');
                }
            } catch (error) {
                showToast('Error rejecting evaluator', 'error');
            }
        }

        // Add Evaluator Modal
        function openAddEvaluatorModal(nominationId) {
            currentNominationId = nominationId;
            document.getElementById('userPickerModal').style.display = 'flex';
            document.getElementById('userPickerModal').classList.add('active');
            document.getElementById('addEvaluatorSearch').value = '';
            document.getElementById('addUserResults').innerHTML = '';
            document.getElementById('addEvaluatorSearch').focus();
        }

        function closeAddEvaluatorModal() {
            document.getElementById('userPickerModal').style.display = 'none';
            document.getElementById('userPickerModal').classList.remove('active');
            currentNominationId = null;
        }

        async function searchUsersToAdd() {
            const query = document.getElementById('addEvaluatorSearch').value.trim();

            if (searchTimeout) clearTimeout(searchTimeout);
            if (query.length < 2) {
                document.getElementById('addUserResults').innerHTML = '';
                return;
            }

            searchTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/feedback/evaluator-nomination/users/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    const users = data.users || [];

                    if (users.length === 0) {
                        document.getElementById('addUserResults').innerHTML = '<div style="text-align: center; padding: 20px; color: var(--gray-500);">No users found</div>';
                        return;
                    }

                    document.getElementById('addUserResults').innerHTML = users.map(user => `
                        <div style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; cursor: pointer; transition: background 0.2s;"
                             onmouseover="this.style.background='var(--gray-50)'"
                             onmouseout="this.style.background='transparent'"
                             onclick="addEvaluatorAsManager('${user.username}', '${user.full_name}', '${user.job_title || ''}', '${user.team || ''}', '${user.vertical || ''}')">
                            <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), #8b5cf6); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px;">
                                ${getInitials(user.full_name)}
                            </div>
                            <div>
                                <div style="font-size: 14px; font-weight: 600; color: var(--gray-900);">${user.full_name}</div>
                                <div style="font-size: 12px; color: var(--gray-500);">${user.job_title || ''} ${user.team ? '• ' + user.team : ''}</div>
                            </div>
                        </div>
                    `).join('');
                } catch (error) {
                    console.error('Error searching:', error);
                }
            }, 300);
        }

        async function addEvaluatorAsManager(username, fullName, jobTitle, team, vertical) {
            const reason = prompt('Enter reason for adding this evaluator:');
            if (!reason) return;

            try {
                const response = await fetch(`/api/feedback/evaluator-nomination/${currentNominationId}/add-evaluator`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        evaluator_username: username,
                        reason: reason
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Evaluator added', 'success');
                    closeAddEvaluatorModal();
                    loadRequests();
                } else {
                    showToast(data.error || 'Error adding evaluator', 'error');
                }
            } catch (error) {
                showToast('Error adding evaluator', 'error');
            }
        }

        async function closeNomination(nominationId) {
            try {
                const response = await fetch(`/api/feedback/evaluator-nomination/${nominationId}/close`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();
                if (data.success) {
                    showToast('Nomination closed', 'success');
                    loadRequests();
                } else {
                    showToast(data.error || 'Error closing', 'error');
                }
            } catch (error) {
                showToast('Error closing nomination', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // Close modal on escape
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeAddEvaluatorModal();
        });
    </script>
</body>
</html>
