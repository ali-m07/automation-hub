apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: automation-hub

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - pvc.yaml
  - hpa.yaml

commonLabels:
  app: automation-hub
  managed-by: kustomize

images:
  - name: automation-hub
    newName: your-registry/automation-hub
    newTag: latest
