{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "automation-hub.fullname" . }}-secrets
  labels:
    {{- include "automation-hub.labels" . | nindent 4 }}
type: Opaque
stringData:
  SESSION_SECRET: {{ .Values.secret.sessionSecret | default "CHANGE-ME-SET-secret.sessionSecret" | quote }}
  {{- if .Values.secret.smtpUser }}
  SMTP_USER: {{ .Values.secret.smtpUser | quote }}
  {{- end }}
  {{- if .Values.secret.smtpPassword }}
  SMTP_PASSWORD: {{ .Values.secret.smtpPassword | quote }}
  {{- end }}
  {{- if .Values.secret.adminEmail }}
  ADMIN_EMAIL: {{ .Values.secret.adminEmail | quote }}
  {{- end }}
{{- end }}
