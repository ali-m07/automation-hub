apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "automation-hub.fullname" . }}
  labels:
    {{- include "automation-hub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "automation-hub.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "automation-hub.name" . }}
        app.kubernetes.io/name: {{ include "automation-hub.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        envFrom:
        - configMapRef:
            name: {{ include "automation-hub.fullname" . }}-config
        - secretRef:
            name: {{ include "automation-hub.fullname" . }}-secrets
            optional: true
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: uploads
          mountPath: /app/uploads
        - name: outputs
          mountPath: /app/outputs
      volumes:
      - name: data
        {{- if .Values.persistence.data.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "automation-hub.fullname" . }}-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: uploads
        {{- if .Values.persistence.uploads.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "automation-hub.fullname" . }}-uploads
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: outputs
        {{- if .Values.persistence.outputs.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "automation-hub.fullname" . }}-outputs
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
